name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Static gates (syntax, offline discipline, hygiene)
        run: npm run gates
      - name: Headless smoke suite (jsdom)
        run: npm test
